<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="description" content="Make your invisible work visible. Track and quantify the unpaid, invisible work you do every day." />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/icons/favicon-16.png" />

    <!-- iOS-specific PWA support (Safari doesn't read manifest.json fully) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quantify" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/apple-touch-icon.png" />

    <!-- Android/Chrome address bar color -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Quantify — Make your invisible work visible</title>
  </head>
  <body>
    <noscript>You need JavaScript to run Quantify.</noscript>
    <div id="root"></div>

    <script>
      // Register service worker for offline support + installability.
      // Only runs in production build (localhost skipped to avoid dev caching issues).
      if ("serviceWorker" in navigator && window.location.hostname !== "localhost") {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("%PUBLIC_URL%/service-worker.js")
            .then((reg) => console.log("Quantify: service worker registered", reg.scope))
            .catch((err) => console.log("Quantify: service worker registration failed", err));
        });
      }
    </script>
  </body>
</html>
